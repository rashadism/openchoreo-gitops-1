apiVersion: openchoreo.dev/v1alpha1
kind: ComponentRelease
metadata:
  name: db-20260514-1
  namespace: default
spec:
  componentType:
    kind: ClusterComponentType
    name: deployment/service
    spec:
      environmentConfigs:
        openAPIV3Schema:
          $defs:
            ResourceQuantity:
              default: {}
              properties:
                cpu:
                  default: 100m
                  type: string
                memory:
                  default: 256Mi
                  type: string
              type: object
            ResourceRequirements:
              default: {}
              properties:
                limits:
                  $ref: '#/$defs/ResourceQuantity'
                requests:
                  $ref: '#/$defs/ResourceQuantity'
              type: object
          properties:
            imagePullPolicy:
              default: IfNotPresent
              enum:
              - Always
              - IfNotPresent
              - Never
              type: string
            replicas:
              default: 1
              minimum: 0
              type: integer
            resources:
              $ref: '#/$defs/ResourceRequirements'
          type: object
      resources:
      - id: deployment
        template:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            labels: ${metadata.labels}
            name: ${metadata.name}
            namespace: ${metadata.namespace}
          spec:
            replicas: ${environmentConfigs.replicas}
            selector:
              matchLabels: ${metadata.podSelectors}
            template:
              metadata:
                labels: ${metadata.podSelectors}
              spec:
                containers:
                - args: |
                    ${has(workload.container.args) ? workload.container.args : oc_omit()}
                  command: |
                    ${has(workload.container.command) ? workload.container.command : oc_omit()}
                  env: ${dependencies.toContainerEnvs()}
                  envFrom: ${configurations.toContainerEnvFrom()}
                  image: ${workload.container.image}
                  imagePullPolicy: ${environmentConfigs.imagePullPolicy}
                  name: main
                  resources:
                    limits:
                      cpu: ${environmentConfigs.resources.limits.cpu}
                      memory: ${environmentConfigs.resources.limits.memory}
                    requests:
                      cpu: ${environmentConfigs.resources.requests.cpu}
                      memory: ${environmentConfigs.resources.requests.memory}
                  volumeMounts: ${configurations.toContainerVolumeMounts()}
                volumes: ${configurations.toVolumes()}
      - id: service
        includeWhen: ${size(workload.endpoints) > 0}
        template:
          apiVersion: v1
          kind: Service
          metadata:
            labels: ${metadata.labels}
            name: ${metadata.componentName}
            namespace: ${metadata.namespace}
          spec:
            ports: ${workload.toServicePorts()}
            selector: ${metadata.podSelectors}
            type: ClusterIP
      - forEach: ${workload.endpoints.transformMap(name, ep, "external" in ep.visibility
          && ep.type in ["HTTP", "GraphQL", "Websocket"], ep)}
        id: httproute-external
        template:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            labels: '${oc_merge(metadata.labels, {"openchoreo.dev/endpoint-name":
              endpoint.key, "openchoreo.dev/endpoint-visibility": "external"})}'
            name: ${oc_generate_name(metadata.componentName, endpoint.key)}
            namespace: ${metadata.namespace}
          spec:
            hostnames: |
              ${[gateway.ingress.external.?http, gateway.ingress.external.?https]
                .filter(g, g.hasValue()).map(g, g.value().host).distinct()
                .map(h, metadata.environmentName + "-" + metadata.componentNamespace + "." + h)}
            parentRefs:
            - name: ${gateway.ingress.external.name}
              namespace: ${gateway.ingress.external.namespace}
            rules:
            - backendRefs:
              - name: ${metadata.componentName}
                port: ${endpoint.value.port}
              filters:
              - type: URLRewrite
                urlRewrite:
                  path:
                    replacePrefixMatch: ${endpoint.value.?basePath.orValue("/")}
                    type: ReplacePrefixMatch
              matches:
              - path:
                  type: PathPrefix
                  value: /${metadata.componentName}-${endpoint.key}
        var: endpoint
      - forEach: ${workload.endpoints.transformMap(name, ep, "internal" in ep.visibility
          && ep.type in ["HTTP", "GraphQL", "Websocket"], ep)}
        id: httproute-internal
        template:
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata:
            labels: '${oc_merge(metadata.labels, {"openchoreo.dev/endpoint-name":
              endpoint.key, "openchoreo.dev/endpoint-visibility": "internal"})}'
            name: ${oc_generate_name(metadata.componentName, endpoint.key, "internal")}
            namespace: ${metadata.namespace}
          spec:
            hostnames: |
              ${[gateway.ingress.internal.?http, gateway.ingress.internal.?https]
                .filter(g, g.hasValue()).map(g, g.value().host).distinct()
                .map(h, metadata.environmentName + "-" + metadata.componentNamespace + "." + h)}
            parentRefs:
            - name: ${gateway.ingress.internal.name}
              namespace: ${gateway.ingress.internal.namespace}
            rules:
            - backendRefs:
              - name: ${metadata.componentName}
                port: ${endpoint.value.port}
              filters:
              - type: URLRewrite
                urlRewrite:
                  path:
                    replacePrefixMatch: ${endpoint.value.?basePath.orValue("/")}
                    type: ReplacePrefixMatch
              matches:
              - path:
                  type: PathPrefix
                  value: /${metadata.componentName}-${endpoint.key}
        var: endpoint
      - forEach: ${configurations.toConfigEnvsByContainer()}
        id: env-config
        template:
          apiVersion: v1
          data: |
            ${envConfig.envs.transformMapEntry(index, env, {env.name: env.value})}
          kind: ConfigMap
          metadata:
            name: ${envConfig.resourceName}
            namespace: ${metadata.namespace}
        var: envConfig
      - forEach: ${configurations.toConfigFileList()}
        id: file-config
        template:
          apiVersion: v1
          data:
            ${config.name}: |
              ${config.value}
          kind: ConfigMap
          metadata:
            name: ${config.resourceName}
            namespace: ${metadata.namespace}
        var: config
      - forEach: ${configurations.toSecretEnvsByContainer()}
        id: secret-env-external
        template:
          apiVersion: external-secrets.io/v1
          kind: ExternalSecret
          metadata:
            name: ${secretEnv.resourceName}
            namespace: ${metadata.namespace}
          spec:
            data: |
              ${secretEnv.envs.map(secret, {
                "secretKey": secret.name,
                "remoteRef": {
                  "key": secret.remoteRef.key,
                  ?"property": secret.remoteRef.?property
                }
              })}
            refreshInterval: 15s
            secretStoreRef:
              kind: ClusterSecretStore
              name: ${dataplane.secretStore}
            target:
              creationPolicy: Owner
              name: ${secretEnv.resourceName}
        var: secretEnv
      - forEach: ${configurations.toSecretFileList()}
        id: secret-file-external
        template:
          apiVersion: external-secrets.io/v1
          kind: ExternalSecret
          metadata:
            name: ${file.resourceName}
            namespace: ${metadata.namespace}
          spec:
            data:
            - remoteRef:
                key: ${file.remoteRef.key}
                property: |
                  ${has(file.remoteRef.property) ? file.remoteRef.property : oc_omit()}
              secretKey: ${file.name}
            refreshInterval: 15s
            secretStoreRef:
              kind: ClusterSecretStore
              name: ${dataplane.secretStore}
            target:
              creationPolicy: Owner
              name: ${file.resourceName}
        var: file
      workloadType: deployment
  owner:
    componentName: db
    projectName: notes
  workload:
    container:
      env:
      - key: POSTGRES_USER
        value: notes
      - key: POSTGRES_PASSWORD
        value: notes
      - key: POSTGRES_DB
        value: notes
      - key: PGDATA
        value: /tmp/pgdata
      image: postgres:16-alpine
    endpoints:
      tcp:
        port: 5432
        type: TCP
