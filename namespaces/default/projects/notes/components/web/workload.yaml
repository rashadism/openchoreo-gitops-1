apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: web-workload
  namespace: default
spec:
  owner:
    componentName: web
    projectName: notes
  container:
    image: host.k3d.internal:10082/notes-web-image:v1-4d580bda
    env:
      - key: PORT
        value: "8080"
  endpoints:
    http:
      type: HTTP
      port: 8080
      visibility: [external]
  dependencies:
    endpoints:
      - component: api
        name: http
        visibility: project
        envBindings:
          address: API_URL
