apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: adservice
  namespace: default
spec:
  owner:
    componentName: adservice
    projectName: online-boutique
  container:
    image: us-central1-docker.pkg.dev/google-samples/microservices-demo/adservice:v0.10.5
    env:
      - key: PORT
        value: "9555"
  endpoints:
    grpc:
      type: TCP
      port: 9555
