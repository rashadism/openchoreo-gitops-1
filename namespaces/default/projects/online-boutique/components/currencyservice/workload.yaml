apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: currencyservice
  namespace: default
spec:
  owner:
    componentName: currencyservice
    projectName: online-boutique
  container:
    image: us-central1-docker.pkg.dev/google-samples/microservices-demo/currencyservice:v0.10.5
    env:
      - key: PORT
        value: "7000"
      - key: DISABLE_PROFILER
        value: "1"
  endpoints:
    grpc:
      type: TCP
      port: 7000
